<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Appointments — Karil Admin</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="../assets/icons/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Lato:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/admin.css">
  <script>try{var t=localStorage.getItem('khb-admin-theme');if(t)document.documentElement.setAttribute('data-theme',t);}catch(e){}</script>
</head>
<body class="admin" data-page="bookings">

<div class="admin-shell">

  <!-- Sidebar -->
  <aside class="admin-sidebar">
    <div class="admin-logo">
      <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M15 9.5c-6.5 7-6.5 22 0 29.5" stroke-linecap="round"/>
        <path d="M23.5 6c-8.5 8.5-8.5 27.5 0 36" stroke-linecap="round"/>
        <path d="M32 10c-5.5 6.5-5.5 21 0 27.5" stroke-linecap="round"/>
        <path d="M38.5 11l1.3 3.4 3.4 1.3-3.4 1.3-1.3 3.4-1.3-3.4-3.4-1.3 3.4-1.3z" fill="currentColor" stroke="none"/>
      </svg>
      <div>
        <div class="admin-logo-name">Karil</div>
        <div class="admin-logo-tag">Admin Suite</div>
      </div>
    </div>
    <nav class="admin-nav" aria-label="Admin">
      <div class="admin-nav-label">Manage</div>
      <a href="./dashboard.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="8" height="8" rx="2"/><rect x="13" y="3" width="8" height="5" rx="2"/><rect x="13" y="10" width="8" height="11" rx="2"/><rect x="3" y="13" width="8" height="8" rx="2"/></svg>Today</a>
      <a href="./bookings.html" class="is-active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M8 3v4m8-4v4M3 10h18" stroke-linecap="round"/></svg>Appointments</a>
      <a href="./inventory.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 8l-9-5-9 5v8l9 5 9-5V8z"/><path d="M3.5 8.5L12 13l8.5-4.5M12 13v8"/></svg>Products & Stock</a>
      <a href="./clients.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="9" cy="8" r="3.5"/><path d="M2.5 20c.8-3.2 3.4-5 6.5-5s5.7 1.8 6.5 5" stroke-linecap="round"/><circle cx="17" cy="9" r="2.5"/><path d="M16.5 15c2.6.2 4.4 1.7 5 4.5" stroke-linecap="round"/></svg>Clients</a>
      <a href="./analytics.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 20V10m6 10V4m6 16v-7m4 7H2" stroke-linecap="round"/></svg>Earnings</a>
    </nav>
    <div class="admin-sidebar-foot">
      <button class="theme-toggle" type="button">
        <span>Dark mode</span>
        <span class="track"><span class="thumb"></span></span>
      </button>
      <a class="back-to-site" href="../index.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5m6-6l-6 6 6 6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        View website
      </a>
    </div>
  </aside>
  <div class="sidebar-backdrop"></div>

  <!-- Main -->
  <div class="admin-main">
    <header class="admin-topbar">
      <button class="sidebar-toggle" aria-label="Open menu"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16" stroke-linecap="round"/></svg></button>
      <div class="topbar-title">
        <h1>Appointments</h1>
        <p id="bookings-count">—</p>
      </div>
      <div class="topbar-spacer"></div>
      <button class="a-btn a-btn--gold" id="add-booking">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 5v14M5 12h14" stroke-linecap="round"/></svg>
        New Appointment
      </button>
      <div class="topbar-avatar">K</div>
    </header>

    <main class="admin-content">

      <!-- Filters -->
      <div class="panel">
        <div class="filter-row">
          <div class="grow"><input class="a-input" id="bk-search" type="search" placeholder="Search a client name or phone…" aria-label="Search appointments"></div>
          <select class="a-select" id="bk-status" aria-label="Filter by status" style="width:160px;">
            <option value="all">All statuses</option>
            <option>Pending</option>
            <option>Confirmed</option>
            <option>In Progress</option>
            <option>Completed</option>
            <option>Cancelled</option>
          </select>
          <select class="a-select" id="bk-type" aria-label="Filter by service" style="width:170px;">
            <option value="all">All services</option>
            <option>Braids</option>
            <option>Wigs</option>
            <option>Nails</option>
            <option>Lashes</option>
            <option>Brows</option>
            <option>Make-Up</option>
            <option>Facial</option>
          </select>
          <input class="a-input" id="bk-from" type="date" aria-label="From date" style="width:160px;">
          <input class="a-input" id="bk-to" type="date" aria-label="To date" style="width:160px;">
        </div>
      </div>

      <!-- Table -->
      <div class="panel">
        <div class="table-wrap">
          <table class="a-table">
            <thead>
              <tr>
                <th>Client</th><th>Service</th><th>Date</th><th>Stylist</th><th>Package</th><th>Price</th><th>Status</th>
              </tr>
            </thead>
            <tbody id="bookings-body"></tbody>
          </table>
        </div>
        <p class="panel-sub" style="margin-top:0.8rem;">Click any row to view details and update its status.</p>
      </div>

    </main>
  </div>
</div>

<!-- Drawer -->
<div class="a-modal-backdrop" id="drawer-backdrop"></div>
<aside class="a-drawer" id="booking-drawer" role="dialog" aria-label="Appointment details">
  <div class="a-drawer-head">
    <h2 id="drawer-title">Appointment</h2>
    <button class="a-drawer-close" id="drawer-close" aria-label="Close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M6 6l12 12M18 6L6 18" stroke-linecap="round"/></svg>
    </button>
  </div>
  <div class="a-drawer-body" id="drawer-body"></div>
</aside>

<script src="../js/admin.js" defer></script>
</body>
</html>
