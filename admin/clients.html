<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customers — Karil Admin</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="../assets/icons/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Lato:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/admin.css">
  <script>try{var t=localStorage.getItem('khb-admin-theme');if(t)document.documentElement.setAttribute('data-theme',t);}catch(e){}</script>
</head>
<body class="admin" data-page="clients">

<div class="admin-shell">

  <aside class="admin-sidebar">
    <div class="admin-logo">
      <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M15 9.5c-6.5 7-6.5 22 0 29.5" stroke-linecap="round"/><path d="M23.5 6c-8.5 8.5-8.5 27.5 0 36" stroke-linecap="round"/><path d="M32 10c-5.5 6.5-5.5 21 0 27.5" stroke-linecap="round"/><path d="M38.5 11l1.3 3.4 3.4 1.3-3.4 1.3-1.3 3.4-1.3-3.4-3.4-1.3 3.4-1.3z" fill="currentColor" stroke="none"/></svg>
      <div>
        <div class="admin-logo-name">Karil</div>
        <div class="admin-logo-tag">Salon Manager</div>
      </div>
    </div>
    <nav class="admin-nav" aria-label="Admin">
      <div class="admin-nav-label">Manage</div>
      <a href="./dashboard.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="8" height="8" rx="2"/><rect x="13" y="3" width="8" height="5" rx="2"/><rect x="13" y="10" width="8" height="11" rx="2"/><rect x="3" y="13" width="8" height="8" rx="2"/></svg>Dashboard</a>
      <a href="./bookings.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M8 3v4m8-4v4M3 10h18" stroke-linecap="round"/></svg>Appointments</a>
      <a href="./walkin.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 3h5a2 2 0 012 2v14a2 2 0 01-2 2h-5" stroke-linecap="round" stroke-linejoin="round"/><path d="M10 8l4 4-4 4M14 12H3" stroke-linecap="round" stroke-linejoin="round"/></svg>Walk-In</a>
      <a href="./clients.html" class="is-active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="9" cy="8" r="3.5"/><path d="M2.5 20c.8-3.2 3.4-5 6.5-5s5.7 1.8 6.5 5" stroke-linecap="round"/><circle cx="17" cy="9" r="2.5"/><path d="M16.5 15c2.6.2 4.4 1.7 5 4.5" stroke-linecap="round"/></svg>Customers</a>
      <a href="./payments.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="2.5"/><path d="M6 12h.01M18 12h.01" stroke-linecap="round"/></svg>Payments</a>
      <a href="./reports.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 4H6a2 2 0 00-2 2v13a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2h-3"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M8 12h8M8 16h5" stroke-linecap="round"/></svg>Reports</a>
      <a href="./staff.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4" y="3" width="16" height="18" rx="2.5"/><circle cx="12" cy="9" r="2.6"/><path d="M7.5 17c0-2.2 2-3.4 4.5-3.4s4.5 1.2 4.5 3.4" stroke-linecap="round"/></svg>Staff</a>
    </nav>
    <div class="admin-sidebar-foot">
      <button class="theme-toggle" type="button">
        <span>Dark mode</span>
        <span class="track"><span class="thumb"></span></span>
      </button>
      <a class="back-to-site" href="../index.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5m6-6l-6 6 6 6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        View website
      </a>
    </div>
  </aside>
  <div class="sidebar-backdrop"></div>

  <div class="admin-main">
    <header class="admin-topbar">
      <button class="sidebar-toggle" aria-label="Open menu"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16" stroke-linecap="round"/></svg></button>
      <div class="topbar-title">
        <h1>Customers</h1>
        <p id="clients-count">—</p>
      </div>
      <div class="topbar-spacer"></div>
      <button class="a-btn a-btn--gold" id="add-client"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 5v14M5 12h14" stroke-linecap="round"/></svg>New Customer</button>
      <div class="topbar-avatar">K</div>
    </header>

    <main class="admin-content">

      <div class="panel">
        <div class="filter-row"><div class="grow"><input class="a-input" id="cl-search" type="search" placeholder="Search by name, phone or email…" aria-label="Search customers"></div></div>
      </div>
      <div class="panel">
        <div class="table-wrap"><table class="a-table">
          <thead><tr><th>Customer</th><th>Phone</th><th>Visits</th><th>Total spent</th><th>Last visit</th><th>Found us via</th></tr></thead>
          <tbody id="clients-body"></tbody></table></div>
        <p class="panel-sub" style="margin-top:0.8rem;">Tap a customer to see their history and notes.</p>
      </div>

    </main>
  </div>
</div>

<div class="a-modal-backdrop" id="drawer-backdrop"></div>
<aside class="a-drawer" id="page-drawer" role="dialog" aria-label="Details">
  <div class="a-drawer-head">
    <h2 id="drawer-title">Details</h2>
    <button class="a-drawer-close" id="drawer-close" aria-label="Close"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M6 6l12 12M18 6L6 18" stroke-linecap="round"/></svg></button>
  </div>
  <div class="a-drawer-body" id="drawer-body"></div>
</aside>

<script src="../js/admin.js" defer></script>
</body>
</html>
